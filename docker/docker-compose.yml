version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: greenhouse_postgres
    environment:
      POSTGRES_USER: greenhouse
      POSTGRES_PASSWORD: greenhouse
      POSTGRES_DB: greenhouse
    ports:
      - "5432:5432"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: greenhouse_backend
    depends_on:
      - postgres
    ports:
      - "8000:8000"
    volumes:
      - ../backend:/app

volumes:
  postgres_data: