version: "3.9"

services:

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: greenhouse_mqtt_broker
    ports:
      - "1883:1883"

  postgres:
    image: postgres:15
    container_name: greenhouse_postgres
    environment:
      POSTGRES_USER: greenhouse
      POSTGRES_PASSWORD: greenhouse
      POSTGRES_DB: greenhouse
    ports:
      - "5432:5432"
    volumes:
      - ./database:/docker-entrypoint-initdb.d
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U greenhouse -d greenhouse"]
      interval: 2s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: greenhouse_backend
    depends_on:
      postgres:
        condition: service_healthy
      mqtt-broker:
        condition: service_started
    ports:
      - "8000:8000"
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - MQTT_BROKER_HOST=mqtt-broker
      - MQTT_BROKER_PORT=1883
    volumes:
      - ../backend:/app

  frontend-dashboard:
    build:
      context: ..
      dockerfile: docker/frontend-dashboard.Dockerfile
    container_name: greenhouse_frontend_dashboard
    depends_on:
      - backend
    ports:
      - "3000:5173"
    command: npm run dev -- --host 0.0.0.0 --port 5173
    volumes:
      - /app/node_modules
      - ../frontend-dashboard:/app

  frontend-device-config:
    build:
      context: ..
      dockerfile: docker/frontend-device-config.Dockerfile
    container_name: greenhouse_frontend_device_config
    depends_on:
      - backend
    ports:
      - "3001:5174"
    command: npm run dev -- --host 0.0.0.0 --port 5174
    volumes:
      - /app/node_modules
      - ../frontend-device-config:/app

  sensor-emulator-manager:
    image: python:3.11-slim
    container_name: greenhouse_sensor_emulator_manager
    depends_on:
      - backend
      - mqtt-broker
    working_dir: /app
    command: sh -c "pip install --no-cache-dir requests paho-mqtt && python sensor_manager.py"
    environment:
      - BACKEND_URL=http://backend:8000
      - MQTT_BROKER_HOST=mqtt-broker
      - MQTT_BROKER_PORT=1883
    volumes:
      - ../device-emulator:/app

volumes:
  postgres_data: