# Backend reads telemetry/state/heartbeats and sends actuator commands.
user backend_user
topic read greenhouse/sensors/+/data
topic read greenhouse/actuators/+/state
topic read greenhouse/devices/+/heartbeat
topic write greenhouse/actuators/+/cmd

# Device runtime publishes telemetry/state/heartbeats and receives actuator commands.
user device_user
topic write greenhouse/sensors/+/data
topic write greenhouse/actuators/+/state
topic write greenhouse/devices/+/heartbeat
topic read greenhouse/actuators/+/cmd
